server {
    listen 80;
    listen [::]:80;
    server_name __WATER_PUBLIC_DOMAIN__;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 64m;
    client_body_timeout 120s;

    location = /admin/releases/desktop {
        client_max_body_size 2g;
        client_body_timeout 1800s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_pass http://127.0.0.1:8000;
    }

    location = /admin/releases/bundle {
        client_max_body_size 2g;
        client_body_timeout 1800s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_pass http://127.0.0.1:8000;
    }

    location = /_desktop_release/desktop-latest.zip {
        internal;
        alias /opt/water-detection/storage/releases/desktop-latest.zip;
        sendfile on;
        tcp_nopush on;
    }

    location ~ "^/_mobile_release/(?<release_id>[0-9a-f]{32}-android)\.apk$" {
        internal;
        alias /opt/water-detection/storage/releases/$release_id.apk;
        default_type application/vnd.android.package-archive;
        error_page 403 404 = @mobile_release_unavailable;
        sendfile on;
        tcp_nopush on;
    }

    location @mobile_release_unavailable {
        internal;
        default_type application/json;
        return 503 '{"code":"mobile_release_unavailable","message":"mobile release is unavailable"}';
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_pass http://127.0.0.1:8000;
    }
}
